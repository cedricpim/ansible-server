---
general_scripts_directory: "/usr/local/bin"

logs_directory: "/var/log"

systemd_directory: "/etc/systemd/system"
lib_systemd_directory: "/lib/systemd/system"

webserver_nginx_user: "nginx"
webserver_nginx_config_directory: "/etc/nginx"
webserver_nginx_log_directory: "/var/log/nginx"
webserver_nginx_content_directory: "/var/www"
webserver_nginx_pidfile: "/var/run/nginx.pid"
webserver_letsencrypt_config_directory: "/etc/letsencrypt"

monit_directory: "/etc/monit"
monit_logfile: "/var/log/monit.log"
monit_sender: "monit@localhost"

fail2ban_sender: "fail2ban@localhost"

email_webmaster: "root"

services:
  - "dav"
  - "gallery"
  - "keeweb"
  - "ledger"
  - "monit"
  - "netdata"
  - "sync"

ansible_managed: |
  WARNING: This file is managed by Ansible
  Template: {{ template_path }}
  Modified: {{ ansible_facts.date_time.iso8601 }}
  Host: {{ ansible_facts.hostname }}
  DO NOT EDIT MANUALLY - Changes will be overwritten
