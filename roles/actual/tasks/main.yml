---
- name: "Install nodejs and npm"
  apt:
    name:
      - "nodejs"
      - "npm"
    state: "latest"

- name: "Create {{ actual_user }} user"
  user:
    name: "{{ actual_user }}"
    home: "{{ actual_home }}"
    shell: "/bin/false"
    state: "present"

- name: "Create actual directories"
  file:
    path: "{{ item.path }}"
    owner: "{{ actual_user }}"
    group: "{{ actual_user }}"
    mode: "{{ item.mode }}"
    state: "directory"
  with_items:
    - { path: "{{ actual_server_directory }}", mode: "0750" }
    - { path: "{{ actual_data_directory }}", mode: "0750" }
    - { path: "{{ actual_log_directory }}", mode: "0755" }

- name: "Install @actual-app/sync-server"
  npm:
    name: "@actual-app/sync-server"
    path: "{{ actual_server_directory }}"
    state: "present"

- name: "Copy actual systemd service"
  template:
    src: "systemd/actual.service.j2"
    dest: "{{ systemd_directory }}/actual.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Restart actual"

- name: "Enable/start actual"
  systemd:
    name: "actual"
    state: "started"
    enabled: yes
    daemon_reload: yes

- include_role:
    name: "webserver"
    tasks_from: "configure"
  vars:
    conf: "actual.conf"
    credentials:
      - "htpasswd.actual"

- include_role:
    name: "monit"
    tasks_from: "configure"
  vars:
    conf: "actual"
